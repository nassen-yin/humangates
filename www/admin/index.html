<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>运营面板 — Human Gates</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='8' fill='%231a56db'/><text x='50%25' y='55%25' dominant-baseline='middle' text-anchor='middle' fill='white' font-size='18' font-weight='700' font-family='sans-serif'>HG</text></svg>">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:-apple-system,PingFang SC,Helvetica Neue,sans-serif; background:#f3f4f6; color:#111827; }
    .sidebar { position:fixed; left:0; top:0; bottom:0; width:220px; background:#1e293b; color:#fff; padding:24px 0; }
    .sidebar h2 { padding:0 20px 24px; font-size:16px; border-bottom:1px solid #334155; }
    .sidebar h2 span { color:#6366f1; }
    .sidebar a { display:block; padding:10px 20px; color:#94a3b8; text-decoration:none; font-size:14px; transition:all .15s; cursor:pointer; }
    .sidebar a:hover, .sidebar a.active { color:#fff; background:#334155; }
    .main { margin-left:220px; padding:24px 32px; min-height:100vh; }
    .header { display:flex; justify-content:space-between; align-items:center; margin-bottom:24px; }
    .header h1 { font-size:20px; font-weight:600; }
    .logout-btn { background:none; border:1px solid #d1d5db; padding:6px 14px; border-radius:6px; cursor:pointer; font-size:13px; color:#6b7280; }
    .logout-btn:hover { background:#f3f4f6; }
    .stats { display:grid; grid-template-columns:repeat(auto-fit, minmax(160px,1fr)); gap:12px; margin-bottom:24px; }
    .stat-card { background:#fff; border-radius:10px; padding:16px; border:1px solid #e5e7eb; }
    .stat-card .num { font-size:28px; font-weight:700; color:#1a56db; }
    .stat-card .label { font-size:13px; color:#6b7280; margin-top:4px; }
    .card { background:#fff; border-radius:10px; border:1px solid #e5e7eb; overflow:hidden; margin-bottom:16px; }
    .card-header { padding:14px 16px; border-bottom:1px solid #e5e7eb; font-weight:600; font-size:14px; display:flex; justify-content:space-between; align-items:center; }
    .card-header .left { display:flex; align-items:center; gap:8px; }
    .card-body { padding:16px; }
    table { width:100%; border-collapse:collapse; font-size:14px; }
    th { text-align:left; padding:10px 12px; background:#f9fafb; color:#6b7280; font-weight:500; font-size:12px; text-transform:uppercase; letter-spacing:0.5px; border-bottom:1px solid #e5e7eb; }
    td { padding:10px 12px; border-bottom:1px solid #f3f4f6; }
    tr:hover td { background:#f9fafb; }
    .tag { display:inline-block; padding:2px 8px; border-radius:12px; font-size:12px; font-weight:500; }
    .tag-live { background:#dcfce7; color:#166534; }
    .tag-pending { background:#fef3c7; color:#92400e; }
    .tag-draft { background:#e0e7ff; color:#3730a3; }
    .tag-needs { background:#fce7f3; color:#9d174d; }
    .tag-approve { background:#dbeafe; color:#1e40af; }
    .tag-complete { background:#d1fae5; color:#065f46; }
    .tag-failed { background:#fee2e2; color:#991b1b; }
    .tag-inprogress { background:#e0e7ff; color:#3730a3; }
    .tag-yes { background:#dcfce7; color:#166534; }
    .tag-no { background:#fee2e2; color:#991b1b; }
    .filter-bar { display:flex; gap:8px; margin-bottom:12px; flex-wrap:wrap; }
    .filter-bar select, .filter-bar input { padding:6px 10px; border:1px solid #d1d5db; border-radius:6px; font-size:13px; }
    .filter-bar button { padding:6px 14px; border:1px solid #d1d5db; border-radius:6px; background:#fff; cursor:pointer; font-size:13px; }
    .filter-bar button:hover { background:#f3f4f6; }
    .filter-bar button.primary { background:#1a56db; color:#fff; border-color:#1a56db; }
    .filter-bar button.primary:hover { background:#1648c0; }
    .login-box { max-width:360px; margin:120px auto; background:#fff; border-radius:12px; padding:32px; text-align:center; box-shadow:0 4px 12px rgba(0,0,0,.05); }
    .login-box h2 { margin-bottom:8px; }
    .login-box p { color:#6b7280; font-size:14px; margin-bottom:16px; }
    .login-box input { width:100%; padding:10px 12px; border:1px solid #d1d5db; border-radius:8px; font-size:15px; }
    .login-box input:focus { outline:none; border-color:#1a56db; box-shadow:0 0 0 3px rgba(26,86,219,.1); }
    .login-box button { margin-top:12px; width:100%; padding:10px; border:none; border-radius:8px; background:#1a56db; color:#fff; font-size:15px; cursor:pointer; }
    .login-box button:hover { background:#1648c0; }
    .detail-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
    .detail-field { margin-bottom:8px; }
    .detail-field .l { font-size:12px; color:#6b7280; }
    .detail-field .v { font-size:14px; color:#111827; }
    .toast { position:fixed; bottom:24px; right:24px; background:#111827; color:#fff; padding:12px 20px; border-radius:8px; font-size:14px; z-index:999; display:none; }
    .text-muted { color:#6b7280; font-size:13px; }
    .pagination { display:flex; gap:4px; justify-content:center; margin-top:12px; align-items:center; }
    .pagination button { padding:4px 10px; border:1px solid #d1d5db; border-radius:4px; background:#fff; cursor:pointer; font-size:13px; }
    .pagination button:hover { background:#f3f4f6; }
    .pagination span { font-size:13px; color:#6b7280; }
    .hidden { display:none !important; }
    .detail-section { margin-bottom:20px; }
    .detail-section h3 { font-size:14px; font-weight:600; margin-bottom:8px; color:#374151; }
    .btn-sm { padding:4px 10px; border-radius:6px; border:1px solid #d1d5db; cursor:pointer; font-size:12px; background:#fff; }
    .btn-sm:hover { background:#f3f4f6; }
    .btn-sm.primary { background:#1a56db; color:#fff; border-color:#1a56db; }
    .btn-sm.primary:hover { background:#1648c0; }
    .btn-sm.danger { background:#dc2626; color:#fff; border-color:#dc2626; }
    .btn-sm.success { background:#16a34a; color:#fff; border-color:#16a34a; }
    pre.json { background:#f8fafc; padding:12px; border-radius:8px; font-size:12px; overflow:auto; max-height:300px; border:1px solid #e5e7eb; font-family:Menlo,monospace; }
    .back-link { color:#1a56db; text-decoration:none; font-size:14px; cursor:pointer; }
    .back-link:hover { text-decoration:underline; }
    .flex { display:flex; gap:8px; flex-wrap:wrap; align-items:center; }
    .mb8 { margin-bottom:8px; }
    .mt8 { margin-top:8px; }
    .form-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
    .form-grid .full { grid-column:1/-1; }
    .form-grid label { font-size:12px; color:#6b7280; display:block; margin-bottom:2px; }
    .form-grid input, .form-grid select, .form-grid textarea { width:100%; padding:7px 10px; border:1px solid #d1d5db; border-radius:6px; font-size:13px; box-sizing:border-box; }
    .form-grid textarea { resize:vertical; min-height:60px; }
    .toggle-btn { padding:4px 12px; border-radius:12px; border:1px solid #d1d5db; cursor:pointer; font-size:12px; }
    .toggle-btn.on { background:#dcfce7; color:#166534; border-color:#166534; }
    .toggle-btn.off { background:#fee2e2; color:#991b1b; border-color:#991b1b; }
    .inline-form { display:flex; gap:8px; align-items:flex-end; flex-wrap:wrap; }
    .inline-form label { font-size:12px; color:#6b7280; display:block; margin-bottom:2px; }
    .inline-form input, .inline-form select { padding:6px 10px; border:1px solid #d1d5db; border-radius:6px; font-size:13px; }
    .modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.4); display:flex; align-items:center; justify-content:center; z-index:1000; }
    .modal-box { background:#fff; border-radius:12px; padding:24px; max-width:500px; width:90%; max-height:80vh; overflow-y:auto; }
    .modal-box h3 { margin-bottom:12px; font-size:16px; }
  </style>
</head>
<body>

<div id="app"></div>
<div id="toast" class="toast"></div>

<script>
const API = '/v1';
let key = localStorage.getItem('hg_admin_key') || '';
let state = { view: 'dashboard', taskId: null, supplierId: null, customerId: null };

function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.style.display = 'block';
  setTimeout(() => el.style.display = 'none', 2500);
}

async function api(method, path, body) {
  const h = { 'Content-Type': 'application/json' };
  if (key) h['X-Admin-Key'] = key;
  const res = await fetch(API + path, { method, headers: h, body: body ? JSON.stringify(body) : undefined });
  if (res.status === 401 || res.status === 403) { state.view = 'login'; render(); throw new Error('Unauthorized'); }
  if (!res.ok) { const e = await res.json(); throw new Error(e.detail || 'Request failed'); }
  return res.json();
}

function tag(status) {
  const map = {
    'draft':'tag-draft', 'pending_review':'tag-pending', 'materials_collecting':'tag-pending',
    'needs_info':'tag-needs', 'materials_ready':'tag-approve', 'in_progress':'tag-inprogress',
    'approved':'tag-approve', 'completed':'tag-complete', 'failed':'tag-failed',
    'pending':'tag-pending', 'approved_s':'tag-approve', 'rejected':'tag-failed',
    'active':'tag-live', 'inactive':'tag-pending', 'suspended':'tag-failed',
  };
  return `<span class="tag ${map[status]||'tag-pending'}">${status}</span>`;
}

function boolTag(val) {
  return val ? '<span class="tag tag-yes">是</span>' : '<span class="tag tag-no">否</span>';
}

function render() {
  const app = document.getElementById('app');
  if (!key) { state.view = 'login'; }
  if (state.view === 'login') {
    app.innerHTML = `
      <div class="login-box">
        <h2>Human Gates 运营面板</h2>
        <p>请输入 Admin Key</p>
        <input id="key-input" type="password" placeholder="Admin Key" autofocus>
        <button onclick="login()">进入面板</button>
      </div>`;
    return;
  }
  app.innerHTML = `
    <div class="sidebar">
      <h2>HG <span>运营</span></h2>
      <a class="${state.view==='dashboard'?'active':''}" onclick="navigate('dashboard')">仪表盘</a>
      <a class="${state.view==='tasks'||state.view==='task-detail'?'active':''}" onclick="navigate('tasks')">任务列表</a>
      <a class="${state.view==='suppliers'||state.view==='supplier-detail'?'active':''}" onclick="navigate('suppliers')">供应商管理</a>
      <a class="${state.view==='customers'||state.view==='customer-detail'?'active':''}" onclick="navigate('customers')">客户管理</a>
      <div style="position:absolute;bottom:20px;left:20px;right:20px;font-size:12px;color:#475569;">
        <a href="/supplier-register.html" target="_blank" style="color:#94a3b8;display:block;padding:6px 0;">+ 注册为服务商</a>
        <a href="/" target="_blank" style="color:#94a3b8;display:block;padding:6px 0;">← 返回官网</a>
      </div>
    </div>
    <div class="main">
      <div class="header">
        <h1>${viewTitle()}</h1>
        <button class="logout-btn" onclick="logout()">退出登录</button>
      </div>
      <div id="view-content"></div>
    </div>`;
  loadView();
}

function viewTitle() {
  const m = { 'dashboard':'仪表盘', 'tasks':'任务列表', 'task-detail':'任务详情', 'suppliers':'供应商管理', 'supplier-detail':'供应商详情', 'customers':'客户管理', 'customer-detail':'客户详情' };
  return m[state.view] || 'Human Gates';
}

function navigate(v, extra) {
  state.view = v;
  if (extra) Object.assign(state, extra);
  render();
}

function login() {
  key = document.getElementById('key-input').value.trim();
  if (!key) return;
  localStorage.setItem('hg_admin_key', key);
  state.view = 'dashboard';
  render();
}

function logout() {
  key = ''; localStorage.removeItem('hg_admin_key');
  state.view = 'login'; render();
}

async function loadView() {
  const el = document.getElementById('view-content');
  if (!el) return;
  if (state.view === 'dashboard') loadDashboard(el);
  else if (state.view === 'tasks') loadTasks(el);
  else if (state.view === 'task-detail') loadTaskDetail(el);
  else if (state.view === 'suppliers') loadSuppliers(el);
  else if (state.view === 'supplier-detail') loadSupplierDetail(el);
  else if (state.view === 'customers') loadCustomers(el);
  else if (state.view === 'customer-detail') loadCustomerDetail(el);
}

// ── Dashboard ──
async function loadDashboard(el) {
  try {
    const d = await api('GET', '/tasks/dashboard');
    el.innerHTML = `
      <div class="stats">
        ${Object.entries(d.task_counts).map(([k,v]) =>
          `<div class="stat-card"><div class="num">${v}</div><div class="label">${tag(k)}</div></div>`
        ).join('')}
        <div class="stat-card"><div class="num">${d.total_tasks}</div><div class="label">全部任务</div></div>
      </div>
      <div class="stats">
        ${Object.entries(d.supplier_counts).map(([k,v]) =>
          `<div class="stat-card"><div class="num">${v}</div><div class="label">${tag(k)} 服务商</div></div>`
        ).join('')}
        <div class="stat-card"><div class="num">${d.total_suppliers}</div><div class="label">全部服务商</div></div>
      </div>
      <div class="stats">
        <div class="stat-card"><div class="num">${d.total_customers||0}</div><div class="label">全部客户</div></div>
        <div class="stat-card"><div class="num">${d.active_customers||0}</div><div class="label">活跃客户</div></div>
        <div class="stat-card"><div class="num">${(d.total_credits||0).toLocaleString()}</div><div class="label">总信用额度</div></div>
      </div>
      <div class="card">
        <div class="card-header">快速操作</div>
        <div class="card-body flex">
          <button class="btn-sm primary" onclick="navigate('tasks')">查看所有任务</button>
          <button class="btn-sm" onclick="navigate('tasks')">待审核任务</button>
          <button class="btn-sm" onclick="navigate('suppliers')">供应商管理</button>
          <button class="btn-sm" onclick="navigate('customers')">客户管理</button>
          <a href="/supplier-register.html" target="_blank"><button class="btn-sm">注册为服务商</button></a>
        </div>
      </div>`;
  } catch(e) { el.innerHTML = `<p class="text-muted">加载失败: ${e.message}</p>`; }
}

// ── Task List ──
let taskPage = 0, taskFilter = '';
async function loadTasks(el) {
  try {
    const limit = 20;
    const status = taskFilter ? `&status=${taskFilter}` : '';
    const data = await api('GET', `/tasks?limit=${limit}&offset=${taskPage * limit}${status}`);
    el.innerHTML = `
      <div class="filter-bar">
        <select onchange="taskFilter=this.value;taskPage=0;loadTasks(document.getElementById('view-content'))">
          <option value="">全部状态</option>
          <option value="draft" ${taskFilter==='draft'?'selected':''}>draft</option>
          <option value="needs_info" ${taskFilter==='needs_info'?'selected':''}>needs_info</option>
          <option value="in_progress" ${taskFilter==='in_progress'?'selected':''}>in_progress</option>
          <option value="completed" ${taskFilter==='completed'?'selected':''}>completed</option>
          <option value="failed" ${taskFilter==='failed'?'selected':''}>failed</option>
        </select>
        <span class="text-muted">共 ${data.total} 条</span>
      </div>
      <div class="card">
        <table>
          <thead><tr><th>ID</th><th>类型</th><th>状态</th><th>创建时间</th><th>操作</th></tr></thead>
          <tbody>
            ${data.tasks.map(t => `
              <tr><td style="font-family:monospace;font-size:12px;">${t.task_id.slice(0,12)}...</td>
              <td>${t.type}</td>
              <td>${tag(t.status)}</td>
              <td class="text-muted">${t.created_at.slice(0,10)}</td>
              <td><button class="btn-sm" onclick="navigate('task-detail',{taskId:'${t.task_id}'})">查看</button></td></tr>
            `).join('')}
          </tbody>
        </table>
      </div>
      <div class="pagination">
        <button onclick="taskPage--;loadTasks(document.getElementById('view-content'))" ${taskPage<=0?'disabled':''}>←</button>
        <span>第 ${taskPage+1} 页</span>
        <button onclick="taskPage++;loadTasks(document.getElementById('view-content'))" ${data.tasks.length<limit?'disabled':''}>→</button>
      </div>`;
  } catch(e) { el.innerHTML = `<p class="text-muted">加载失败: ${e.message}</p>`; }
}

// ── Task Detail ──
async function loadTaskDetail(el) {
  try {
    const [task, timeline, progress, docs] = await Promise.all([
      api('GET', `/tasks/${state.taskId}`),
      api('GET', `/tasks/${state.taskId}/timeline`).catch(()=>[]),
      api('GET', `/tasks/${state.taskId}/progress`).catch(()=>null),
      api('GET', `/tasks/${state.taskId}/documents`).catch(()=>null),
    ]);
    const paramsHtml = Object.entries(task.params||{}).map(([k,v]) =>
      `<div class="detail-field"><span class="l">${k}</span><span class="v">${typeof v==='object'?JSON.stringify(v):v||'-'}</span></div>`
    ).join('');

    el.innerHTML = `
      <a class="back-link mb8" onclick="navigate('tasks')">← 返回任务列表</a>
      <div class="card">
        <div class="card-header">
          ${task.task_id.slice(0,16)}... ${tag(task.status)}
          <span class="text-muted">${task.type}</span>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
          <div class="card-body">
            <div class="detail-section">
              <h3>基本信息</h3>
              <div class="detail-grid">${paramsHtml}</div>
            </div>
          </div>
          <div class="card-body">
            <div class="detail-section">
              <h3>状态管理</h3>
              <div class="flex mb8">
                <select id="status-select">
                  ${(getTransitions(task.status)||[]).map(s => `<option value="${s}">${s}</option>`).join('')}
                </select>
                <button class="btn-sm primary" onclick="updateStatus()">更新状态</button>
              </div>
              <input id="status-note" type="text" placeholder="备注（选填）" style="padding:6px 10px;border:1px solid #d1d5db;border-radius:6px;font-size:13px;width:100%;box-sizing:border-box;">
            </div>

            <div class="detail-section">
              <h3>进度</h3>
              ${progress ? `
                <p style="font-size:24px;font-weight:700;color:#1a56db;">${progress.overall_progress_pct}%</p>
                <div style="display:grid;gap:4px;margin-top:8px;">
                  ${progress.step_progress.map(s =>
                    `<div style="display:flex;justify-content:space-between;font-size:13px;">
                      <span>${s.name}</span>
                      <span>${tag(s.status)}${s.blocker?': '+s.blocker:''}</span>
                    </div>`
                  ).join('')}
                </div>` : '<span class="text-muted">暂无进度数据</span>'}
            </div>
          </div>
        </div>
      </div>

      <div class="card">
        <div class="card-header">时间线</div>
        <div class="card-body">
          ${timeline.length ? timeline.map(l => `
            <div style="display:flex;gap:12px;padding:6px 0;border-bottom:1px solid #f3f4f6;font-size:13px;">
              <span class="text-muted" style="white-space:nowrap;">${l.created_at?.slice(11,19)||''}</span>
              <span>${l.action}</span>
              ${l.old_status ? `→ ${tag(l.old_status)} → ${tag(l.new_status)}` : ''}
              ${l.note ? `<span class="text-muted">${l.note}</span>` : ''}
            </div>
          `).join('') : '<span class="text-muted">暂无记录</span>'}
        </div>
      </div>

      ${docs ? `
      <div class="card">
        <div class="card-header">文书</div>
        <div class="card-body">
          <table>
            <thead><tr><th>名称</th><th>状态</th><th>生成时间</th></tr></thead>
            <tbody>
              ${docs.documents.map(d => `
                <tr><td>${d.doc_name}</td><td>${tag(d.doc_status)}</td>
                <td class="text-muted">${d.created_at?.slice(0,10)||'-'}</td></tr>
              `).join('')}
            </tbody>
          </table>
          <button class="btn-sm primary mt8" onclick="generateDocs()">生成文书</button>
        </div>
      </div>` : ''}
    `;
  } catch(e) { el.innerHTML = `<p class="text-muted">加载失败: ${e.message}</p>`; }
}

function getTransitions(status) {
  const m = {
    'draft':['materials_collecting','needs_info'],
    'materials_collecting':['name_verification','needs_info'],
    'name_verification':['submitting','needs_info'],
    'submitting':['in_progress','needs_info'],
    'in_progress':['needs_info','approved'],
    'needs_info':['materials_collecting','submitting'],
    'approved':['completed'],
    'completed':[], 'failed':[],
  };
  return m[status] || [];
}

async function updateStatus() {
  const status = document.getElementById('status-select')?.value;
  const note = document.getElementById('status-note')?.value || null;
  if (!status) return toast('无可用的状态转换');
  try {
    await api('PUT', `/tasks/${state.taskId}/status`, { status, note });
    toast('状态已更新');
    loadTaskDetail(document.getElementById('view-content'));
  } catch(e) { toast('失败: ' + e.message); }
}

async function generateDocs() {
  try {
    const r = await api('POST', `/tasks/${state.taskId}/documents`, {});
    toast(`已生成 ${r.documents.length} 份文书`);
    loadTaskDetail(document.getElementById('view-content'));
  } catch(e) { toast('失败: ' + e.message); }
}

// ── Suppliers ──
let suppPage = 0, suppFilter = '', suppVerified = '', suppAvailable = '', suppMinRating = '';
async function loadSuppliers(el) {
  try {
    const limit = 20;
    const params = new URLSearchParams();
    params.set('limit', limit);
    params.set('offset', suppPage * limit);
    if (suppFilter) params.set('status', suppFilter);
    if (suppVerified) params.set('verified', suppVerified);
    if (suppAvailable) params.set('available', suppAvailable);
    if (suppMinRating) params.set('min_rating', suppMinRating);
    const data = await api('GET', `/suppliers?${params.toString()}`);
    el.innerHTML = `
      <div class="filter-bar">
        <select onchange="suppFilter=this.value;suppPage=0;loadSuppliers(document.getElementById('view-content'))">
          <option value="">全部状态</option>
          <option value="pending" ${suppFilter==='pending'?'selected':''}>待审核</option>
          <option value="approved" ${suppFilter==='approved'?'selected':''}>已通过</option>
          <option value="rejected" ${suppFilter==='rejected'?'selected':''}>已驳回</option>
        </select>
        <select onchange="suppVerified=this.value;suppPage=0;loadSuppliers(document.getElementById('view-content'))">
          <option value="">实名认证</option>
          <option value="true" ${suppVerified==='true'?'selected':''}>已认证</option>
          <option value="false" ${suppVerified==='false'?'selected':''}>未认证</option>
        </select>
        <select onchange="suppAvailable=this.value;suppPage=0;loadSuppliers(document.getElementById('view-content'))">
          <option value="">接单状态</option>
          <option value="true" ${suppAvailable==='true'?'selected':''}>可接单</option>
          <option value="false" ${suppAvailable==='false'?'selected':''}>暂停接单</option>
        </select>
        <select onchange="suppMinRating=this.value;suppPage=0;loadSuppliers(document.getElementById('view-content'))">
          <option value="">最低评分</option>
          <option value="4" ${suppMinRating==='4'?'selected':''}>4+</option>
          <option value="3" ${suppMinRating==='3'?'selected':''}>3+</option>
          <option value="2" ${suppMinRating==='2'?'selected':''}>2+</option>
        </select>
        <span class="text-muted">共 ${data.total} 条</span>
        <a href="/supplier-register.html" target="_blank"><button class="btn-sm primary">新增服务商</button></a>
      </div>
      <div class="card">
        <table>
          <thead><tr><th>ID</th><th>姓名</th><th>城市</th><th>品类</th><th>星级</th><th>任务数</th><th>已认证</th><th>可接单</th><th>状态</th><th>申请时间</th><th>操作</th></tr></thead>
          <tbody>
            ${data.suppliers.map(s => `
              <tr><td>${s.id}</td>
              <td>${s.name}</td>
              <td>${s.city||'-'}</td>
              <td style="font-size:12px;">${(s.service_types||[]).slice(0,2).join(', ')}${(s.service_types||[]).length>2?'...':''}</td>
              <td>${s.rating != null ? '★'.repeat(Math.round(s.ratio||s.rating)) + '☆'.repeat(5-Math.round(s.ratio||s.rating)) : '-'}</td>
              <td>${s.completed_tasks||0}</td>
              <td>${boolTag(s.verified)}</td>
              <td>${boolTag(s.available)}</td>
              <td>${tag(s.status)}</td>
              <td class="text-muted">${s.created_at.slice(0,10)}</td>
              <td><button class="btn-sm" onclick="navigate('supplier-detail',{supplierId:${s.id}})">审核</button></td></tr>
            `).join('')}
          </tbody>
        </table>
      </div>
      <div class="pagination">
        <button onclick="suppPage--;loadSuppliers(document.getElementById('view-content'))" ${suppPage<=0?'disabled':''}>←</button>
        <span>第 ${suppPage+1} 页</span>
        <button onclick="suppPage++;loadSuppliers(document.getElementById('view-content'))" ${data.suppliers.length<limit?'disabled':''}>→</button>
      </div>`;
  } catch(e) { el.innerHTML = `<p class="text-muted">加载失败: ${e.message}</p>`; }
}

// ── Supplier Detail ──
async function loadSupplierDetail(el) {
  try {
    const s = await api('GET', `/suppliers/${state.supplierId}`);
    const regionsStr = (s.regions||[]).join(', ');
    const specialtiesStr = (s.specialties||[]).join(', ');
    el.innerHTML = `
      <a class="back-link mb8" onclick="navigate('suppliers')">← 返回供应商列表</a>
      <div class="card">
        <div class="card-header">${s.name} ${tag(s.status)}</div>
        <div class="card-body">
          <div class="detail-grid">
            ${['name','phone','wechat','city','id_number','qualification_desc'].map(f =>
              `<div class="detail-field"><span class="l">${f}</span><span class="v">${s[f]||'-'}</span></div>`
            ).join('')}
            <div class="detail-field"><span class="l">service_types</span><span class="v">${(s.service_types||[]).join(', ')||'-'}</span></div>
            <div class="detail-field"><span class="l">rating</span><span class="v">${s.rating != null ? '★'.repeat(Math.round(s.ratio||s.rating)) + '☆'.repeat(5-Math.round(s.ratio||s.rating)) + ' ('+s.rating+'/5)' : '-'}</span></div>
            <div class="detail-field"><span class="l">completed_tasks</span><span class="v">${s.completed_tasks||0}</span></div>
            <div class="detail-field"><span class="l">verified</span><span class="v">${boolTag(s.verified)}</span></div>
            <div class="detail-field"><span class="l">available</span><span class="v">${boolTag(s.available)}</span></div>
            <div class="detail-field"><span class="l">regions</span><span class="v">${regionsStr||'-'}</span></div>
            <div class="detail-field"><span class="l">specialties</span><span class="v">${specialtiesStr||'-'}</span></div>
            <div class="detail-field"><span class="l">notes</span><span class="v">${s.notes||'-'}</span></div>
            <div class="detail-field"><span class="l">created_at</span><span class="v">${s.created_at}</span></div>
          </div>
        </div>
      </div>

      <div class="card">
        <div class="card-header">编辑信息</div>
        <div class="card-body">
          <div class="form-grid">
            <div>
              <label>rating</label>
              <input id="edit-rating" type="number" step="0.1" min="0" max="5" value="${s.rating||''}">
            </div>
            <div>
              <label>completed_tasks</label>
              <input id="edit-tasks" type="number" min="0" value="${s.completed_tasks||0}">
            </div>
            <div>
              <label>verified</label>
              <button id="edit-verified" class="toggle-btn ${s.verified?'on':'off'}" onclick="this.classList.toggle('on');this.classList.toggle('off')">${s.verified?'是':'否'}</button>
            </div>
            <div>
              <label>available</label>
              <button id="edit-available" class="toggle-btn ${s.available?'on':'off'}" onclick="this.classList.toggle('on');this.classList.toggle('off')">${s.available?'是':'否'}</button>
            </div>
            <div class="full">
              <label>regions (逗号分隔)</label>
              <input id="edit-regions" type="text" value="${regionsStr}">
            </div>
            <div class="full">
              <label>specialties (逗号分隔)</label>
              <input id="edit-specialties" type="text" value="${specialtiesStr}">
            </div>
          </div>
          <button class="btn-sm primary mt8" onclick="updateSupplierInfo(${s.id})">保存更改</button>
        </div>
      </div>

      ${s.status === 'pending' ? `
      <div class="card">
        <div class="card-header">审核操作</div>
        <div class="card-body">
          <div class="flex">
            <button class="btn-sm success" onclick="reviewSupplier(${s.id},'approved')">通过</button>
            <button class="btn-sm danger" onclick="reviewSupplier(${s.id},'rejected')">驳回</button>
          </div>
          <input id="review-note" type="text" placeholder="审核备注（选填）" style="margin-top:8px;padding:6px 10px;border:1px solid #d1d5db;border-radius:6px;font-size:13px;width:100%;box-sizing:border-box;">
        </div>
      </div>` : ''}`;
  } catch(e) { el.innerHTML = `<p class="text-muted">加载失败: ${e.message}</p>`; }
}

async function updateSupplierInfo(id) {
  const rating = parseFloat(document.getElementById('edit-rating').value);
  const completed_tasks = parseInt(document.getElementById('edit-tasks').value) || 0;
  const verified = document.getElementById('edit-verified').classList.contains('on');
  const available = document.getElementById('edit-available').classList.contains('on');
  const regions = document.getElementById('edit-regions').value.split(',').map(s=>s.trim()).filter(Boolean);
  const specialties = document.getElementById('edit-specialties').value.split(',').map(s=>s.trim()).filter(Boolean);
  try {
    await api('PUT', `/suppliers/${id}/info`, { rating, completed_tasks, verified, available, regions, specialties });
    toast('供应商信息已更新');
    loadSupplierDetail(document.getElementById('view-content'));
  } catch(e) { toast('失败: ' + e.message); }
}

async function reviewSupplier(id, status) {
  const note = document.getElementById('review-note')?.value || null;
  try {
    await api('PUT', `/suppliers/${id}/review`, { status, notes: note });
    toast(`已${status==='approved'?'通过':'驳回'}`);
    loadSupplierDetail(document.getElementById('view-content'));
  } catch(e) { toast('失败: ' + e.message); }
}

// ── Customers ──
let custPage = 0, custFilter = '', custSearch = '';
async function loadCustomers(el) {
  try {
    const limit = 20;
    const params = new URLSearchParams();
    params.set('limit', limit);
    params.set('offset', custPage * limit);
    if (custFilter) params.set('status', custFilter);
    if (custSearch) params.set('search', custSearch);
    const data = await api('GET', `/customers?${params.toString()}`);
    el.innerHTML = `
      <div class="filter-bar">
        <select onchange="custFilter=this.value;custPage=0;loadCustomers(document.getElementById('view-content'))">
          <option value="">全部状态</option>
          <option value="active" ${custFilter==='active'?'selected':''}>活跃</option>
          <option value="inactive" ${custFilter==='inactive'?'selected':''}>非活跃</option>
          <option value="suspended" ${custFilter==='suspended'?'selected':''}>已暂停</option>
        </select>
        <input id="cust-search-inp" type="text" placeholder="搜索客户名称/邮箱" value="${custSearch}" onkeydown="if(event.key==='Enter'){custSearch=this.value;custPage=0;loadCustomers(document.getElementById('view-content'))}">
        <button onclick="custSearch=document.getElementById('cust-search-inp').value;custPage=0;loadCustomers(document.getElementById('view-content'))">搜索</button>
        <button class="btn-sm primary" onclick="showCreateCustomer()">+ 新建客户</button>
        <span class="text-muted">共 ${data.total} 条</span>
      </div>
      <div class="card">
        <table>
          <thead><tr><th>ID</th><th>姓名</th><th>公司</th><th>邮箱</th><th>信用额度</th><th>累计消费</th><th>状态</th><th>操作</th></tr></thead>
          <tbody>
            ${data.customers.map(c => `
              <tr><td>${c.id}</td>
              <td>${c.name}</td>
              <td>${c.company||'-'}</td>
              <td>${c.email||'-'}</td>
              <td>${(c.credits_balance||0).toLocaleString()}</td>
              <td>${(c.total_spent||0).toLocaleString()}</td>
              <td>${tag(c.status||'active')}</td>
              <td><button class="btn-sm" onclick="navigate('customer-detail',{customerId:${c.id}})">查看</button></td></tr>
            `).join('')}
          </tbody>
        </table>
      </div>
      <div class="pagination">
        <button onclick="custPage--;loadCustomers(document.getElementById('view-content'))" ${custPage<=0?'disabled':''}>←</button>
        <span>第 ${custPage+1} 页</span>
        <button onclick="custPage++;loadCustomers(document.getElementById('view-content'))" ${data.customers.length<limit?'disabled':''}>→</button>
      </div>`;
  } catch(e) { el.innerHTML = `<p class="text-muted">加载失败: ${e.message}</p>`; }
}

let createModalActive = false;
function showCreateCustomer() {
  if (createModalActive) return;
  createModalActive = true;
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.id = 'create-cust-modal';
  overlay.innerHTML = `
    <div class="modal-box">
      <h3>新建客户</h3>
      <div class="form-grid">
        <div>
          <label>姓名 *</label>
          <input id="cc-name" type="text" placeholder="客户姓名">
        </div>
        <div>
          <label>邮箱 *</label>
          <input id="cc-email" type="email" placeholder="邮箱地址">
        </div>
        <div>
          <label>公司</label>
          <input id="cc-company" type="text" placeholder="公司名称">
        </div>
        <div>
          <label>电话</label>
          <input id="cc-phone" type="text" placeholder="电话号码">
        </div>
        <div class="full">
          <label>备注</label>
          <textarea id="cc-notes" placeholder="备注信息"></textarea>
        </div>
      </div>
      <div class="flex mt8">
        <button class="btn-sm primary" onclick="createCustomer()">创建</button>
        <button class="btn-sm" onclick="closeCreateModal()">取消</button>
      </div>
    </div>`;
  document.body.appendChild(overlay);
  overlay.addEventListener('click', (e) => { if (e.target === overlay) closeCreateModal(); });
}

function closeCreateModal() {
  const m = document.getElementById('create-cust-modal');
  if (m) m.remove();
  createModalActive = false;
}

async function createCustomer() {
  const name = document.getElementById('cc-name').value.trim();
  const email = document.getElementById('cc-email').value.trim();
  if (!name || !email) return toast('姓名和邮箱为必填项');
  try {
    await api('POST', '/customers', {
      name,
      email,
      company: document.getElementById('cc-company').value.trim() || undefined,
      phone: document.getElementById('cc-phone').value.trim() || undefined,
      notes: document.getElementById('cc-notes').value.trim() || undefined,
    });
    toast('客户已创建');
    closeCreateModal();
    loadCustomers(document.getElementById('view-content'));
  } catch(e) { toast('失败: ' + e.message); }
}

// ── Customer Detail ──
async function loadCustomerDetail(el) {
  try {
    const [c, txns] = await Promise.all([
      api('GET', `/customers/${state.customerId}`),
      api('GET', `/customers/${state.customerId}/transactions`).catch(()=>[]),
    ]);
    const hasTxns = Array.isArray(txns) ? txns : (txns.transactions || []);
    el.innerHTML = `
      <a class="back-link mb8" onclick="navigate('customers')">← 返回客户列表</a>

      <div class="card">
        <div class="card-header">
          <span class="left">${c.name} ${tag(c.status||'active')}</span>
        </div>
        <div class="card-body">
          <div class="detail-grid">
            <div class="detail-field"><span class="l">ID</span><span class="v">${c.id}</span></div>
            <div class="detail-field"><span class="l">邮箱</span><span class="v">${c.email||'-'}</span></div>
            <div class="detail-field"><span class="l">公司</span><span class="v">${c.company||'-'}</span></div>
            <div class="detail-field"><span class="l">电话</span><span class="v">${c.phone||'-'}</span></div>
            <div class="detail-field"><span class="l">信用额度</span><span class="v" style="font-size:20px;font-weight:700;color:#1a56db;">${(c.credits_balance||0).toLocaleString()}</span></div>
            <div class="detail-field"><span class="l">累计消费</span><span class="v" style="font-size:20px;font-weight:700;">${(c.total_spent||0).toLocaleString()}</span></div>
            <div class="detail-field"><span class="l">创建时间</span><span class="v">${c.created_at||'-'}</span></div>
            <div class="detail-field"><span class="l">备注</span><span class="v">${c.notes||'-'}</span></div>
          </div>
        </div>
      </div>

      <div class="card">
        <div class="card-header">充值信用额度</div>
        <div class="card-body">
          <div class="inline-form">
            <div>
              <label>金额</label>
              <input id="recharge-amount" type="number" min="0" step="0.01" placeholder="充值金额">
            </div>
            <div>
              <label>备注</label>
              <input id="recharge-note" type="text" placeholder="充值备注（选填）">
            </div>
            <button class="btn-sm primary" onclick="rechargeCredits(${c.id})">确认充值</button>
          </div>
        </div>
      </div>

      <div class="card">
        <div class="card-header">交易记录</div>
        <div class="card-body">
          ${hasTxns.length ? `
          <table>
            <thead><tr><th>ID</th><th>类型</th><th>金额</th><th>余额</th><th>描述</th><th>时间</th></tr></thead>
            <tbody>
              ${hasTxns.map(t => `
                <tr><td style="font-family:monospace;font-size:12px;">${(t.id+'').slice(0,8)}</td>
                <td>${tag(t.type||t.transaction_type||'unknown')}</td>
                <td style="${(t.amount||0)>=0?'color:#16a34a;':'color:#dc2626;'}">${(t.amount||0)>=0?'+':''}${(t.amount||0).toLocaleString()}</td>
                <td>${(t.balance_after||t.balance||0).toLocaleString()}</td>
                <td>${t.description||t.note||'-'}</td>
                <td class="text-muted">${(t.created_at||'').slice(0,16)||'-'}</td></tr>
              `).join('')}
            </tbody>
          </table>` : '<span class="text-muted">暂无交易记录</span>'}
        </div>
      </div>`;
  } catch(e) { el.innerHTML = `<p class="text-muted">加载失败: ${e.message}</p>`; }
}

async function rechargeCredits(id) {
  const amount = parseFloat(document.getElementById('recharge-amount').value);
  const note = document.getElementById('recharge-note').value.trim() || undefined;
  if (isNaN(amount) || amount <= 0) return toast('请输入有效的充值金额');
  try {
    await api('POST', `/customers/${id}/recharge`, { amount, note });
    toast('充值成功');
    loadCustomerDetail(document.getElementById('view-content'));
  } catch(e) { toast('失败: ' + e.message); }
}

// ── Init ──
render();
</script>
</body>
</html>
